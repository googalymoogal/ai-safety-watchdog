name: AI Report Hunter

on:
  schedule:
    # Runs every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  check_and_summarize:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser openai beautifulsoup4 pypdf

      - name: Run Watchdog Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python watchdog.py

      - name: Commit and push seen_reports updates
        run: |
          git config --global user.name "AI Watchdog"
          git config --global user.email "automation@example.com"
          git add seen_reports.txt

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update seen reports"
            git push
          fi
