name: AI Report Hunter

on:
  schedule:
    # Runs every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows manual testing

jobs:
  check_and_summarize:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Essential for saving the "seen" list
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests feedparser openai beautifulsoup4 pypdf

      - name: Run Watchdog Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python watchdog.py

      - name: Commit and Push if updated
        run: |
          git config --global user.name 'AI Watchdog'
          git config --global user.email 'automation@example.com'
          git add seen_reports.txt
          # Only commit if seen_reports.txt actually changed
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update seen reports" && git push)
